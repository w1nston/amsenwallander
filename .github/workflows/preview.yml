name: Preview deployment

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  deploy-preview:
    if: startsWith(github.head_ref, 'feature/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - name: Deploy preview to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=amsenwallander

      - name: Comment preview URL on pull request
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.deploy.outputs.command-output }}`;
            const urlMatch = output.match(/https:\/\/[a-z0-9-]+\.amsenwallander\.pages\.dev/);
            const deploymentUrl = '${{ steps.deploy.outputs.deployment-url }}';
            const url = deploymentUrl || (urlMatch && urlMatch[0]) || '';
            if (!url) {
              console.log('No preview URL found in deployment output');
              return;
            }
            const marker = '<!-- cloudflare-preview -->';
            const body = `${marker}\nPreview deployment: ${url}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
